# Experiment 4 — MaxViT-Tiny (stronger architecture)
experiment_name: exp4_maxvit_tiny

data_root: ..
train_csv: ../train_df.csv
val_csv: ../val_df.csv
test_csv: ../test_df.csv
train_images_dir: ../train_images/train_images
val_images_dir: ../val_images/val_images
test_images_dir: ../test_images/test_images
num_classes: 20

min_ratio: 0.7    # filter noisy labels

model_name: maxvit_tiny_tf_224.in1k
pretrained: true
dropout: 0.3

img_size: 224
batch_size: 8     # smaller batch — MaxViT is heavier (30M params)
num_epochs: 10
lr: 0.0005
weight_decay: 0.0001
label_smoothing: 0.1
use_weighted_loss: true

seed: 42
output_dir: outputs/exp4_maxvit_tiny
