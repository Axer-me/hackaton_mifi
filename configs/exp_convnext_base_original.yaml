# ConvNeXt-Base on original train only (no team-added data)
experiment_name: exp_convnext_base_original

data_root: ..
train_csv: ../train_df.csv
val_csv: ../val_df.csv
test_csv: ../test_df.csv
train_images_dir: ../train_images/train_images
val_images_dir: ../val_images/val_images
test_images_dir: ../test_images/test_images
num_classes: 20

min_ratio: 0.0

model_name: convnext_base
pretrained: true
dropout: 0.3

img_size: 224
batch_size: 8
num_epochs: 15
lr: 0.0002
weight_decay: 0.0001
label_smoothing: 0.05
use_weighted_loss: false
preload: true
warmup_epochs: 2
early_stopping_patience: 5

seed: 42
output_dir: outputs/exp_convnext_base_original
