# Stronger backbone: EVA02-Small on cleaned full-train data
experiment_name: exp_eva02_small_clean

data_root: ..
train_csv: data/train_df_full_clean.csv
val_csv: ../val_df.csv
test_csv: ../test_df.csv
train_images_dir: ../train_images_full_clean/train_images_full_clean
val_images_dir: ../val_images/val_images
test_images_dir: ../test_images/test_images
num_classes: 20

min_ratio: 0.0

model_name: eva02_small_patch14_224
pretrained: true
dropout: 0.3

img_size: 224
batch_size: 8
num_epochs: 15
lr: 0.00015
weight_decay: 0.0001
label_smoothing: 0.05
use_weighted_loss: false
preload: true
warmup_epochs: 2
early_stopping_patience: 5

seed: 42
output_dir: outputs/exp_eva02_small_clean
